<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O'yin — UzMath Mini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Nunito', sans-serif; }
    .opt-btn { transition: all 0.2s; }
    .opt-btn:hover:not(:disabled) { transform: scale(1.03); }
    .opt-btn:disabled { cursor: not-allowed; }
    .opt-correct { background-color: #10b981 !important; color: white !important; border-color: #059669 !important; }
    .opt-wrong { background-color: #ef4444 !important; color: white !important; border-color: #dc2626 !important; }
    .fade-in { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .timer-bar { transition: width 0.5s linear; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50">

  <!-- Header -->
  <header class="bg-white/80 backdrop-blur-sm shadow-sm">
    <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="index.html" class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold">M</a>
        <div>
          <h1 class="text-sm font-bold text-gray-800" id="headerTitle">UzMath Mini</h1>
          <p class="text-xs text-gray-500" id="headerSub"></p>
        </div>
      </div>
      <div class="flex items-center gap-4">
        <div class="text-right">
          <div class="text-xs text-gray-500">Ball</div>
          <div class="text-lg font-extrabold text-indigo-600" id="scoreDisplay">0</div>
        </div>
        <div id="questionCounter" class="text-right">
          <div class="text-xs text-gray-500">Savol</div>
          <div class="text-lg font-extrabold text-gray-700" id="questionNum">1/10</div>
        </div>
      </div>
    </div>
    <!-- Timer bar (for time mode) -->
    <div id="timerBarWrap" class="hidden h-1.5 bg-gray-200">
      <div id="timerBar" class="timer-bar h-full bg-indigo-500 rounded-r-full" style="width:100%"></div>
    </div>
  </header>

  <!-- Game Area -->
  <main class="max-w-3xl mx-auto px-4 py-8">

    <!-- Active Game -->
    <div id="gameArea" class="fade-in">
      <!-- Question -->
      <div class="bg-white rounded-2xl shadow-md p-6 sm:p-10 mb-6 text-center">
        <p id="questionText" class="text-2xl sm:text-3xl font-extrabold text-gray-800 leading-relaxed"></p>
      </div>

      <!-- Options -->
      <div id="optionsGrid" class="grid grid-cols-2 gap-3 sm:gap-4 mb-6">
        <!-- Filled by JS -->
      </div>

      <!-- Feedback -->
      <div id="feedback" class="hidden text-center py-3">
        <p id="feedbackText" class="text-lg font-bold"></p>
      </div>
    </div>

    <!-- Result Screen -->
    <div id="resultArea" class="hidden fade-in">
      <div class="bg-white rounded-2xl shadow-lg p-8 sm:p-12 text-center">
        <div id="resultEmoji" class="text-6xl mb-4"></div>
        <h2 id="resultTitle" class="text-3xl font-extrabold text-gray-800 mb-2"></h2>
        <p id="resultSub" class="text-gray-500 mb-6"></p>

        <div class="flex items-center justify-center gap-8 mb-8">
          <div>
            <div class="text-4xl font-extrabold text-indigo-600" id="finalScore">0</div>
            <div class="text-sm text-gray-500">Ball</div>
          </div>
          <div class="w-px h-12 bg-gray-200"></div>
          <div>
            <div class="text-4xl font-extrabold text-emerald-600" id="correctCount">0</div>
            <div class="text-sm text-gray-500">To'g'ri</div>
          </div>
          <div class="w-px h-12 bg-gray-200"></div>
          <div>
            <div class="text-4xl font-extrabold text-rose-500" id="wrongCount">0</div>
            <div class="text-sm text-gray-500">Noto'g'ri</div>
          </div>
        </div>

        <!-- Progress bar visual -->
        <div class="w-full bg-gray-200 rounded-full h-3 mb-8">
          <div id="resultBar" class="h-3 rounded-full bg-gradient-to-r from-emerald-400 to-emerald-600 transition-all duration-700" style="width:0%"></div>
        </div>

        <div class="flex flex-col sm:flex-row gap-3 justify-center">
          <button onclick="restartGame()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition">Qayta o'ynash</button>
          <a id="backToTopics" href="#" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition text-center">Mavzularga</a>
          <a href="index.html" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition text-center">Bosh sahifa</a>
        </div>
      </div>
    </div>

  </main>

  <script src="js/supabase.js"></script>
  <script src="js/quarters.js"></script>
  <script>
    let _profile = null;
    let _saved = false;

    // Auth guard
    (async () => {
      _profile = await requireAuth();
    })();

    // ─── Parse params ───
    const params = new URLSearchParams(window.location.search);
    const grade = params.get("grade");
    const topic = params.get("topic");
    const mode = params.get("mode");
    const difficulty = parseInt(params.get("difficulty")) || 1;
    const topicName = params.get("topicName") || "";

    document.getElementById("headerTitle").textContent = topicName;
    document.getElementById("headerSub").textContent = `${grade}-sinf | ${modeName(mode)}`;
    document.getElementById("backToTopics").href = `topics.html?grade=${grade}`;

    function modeName(m) {
      const names = { quick: "Tezkor test", time: "Vaqt chaqiriq", missing: "Yo'qolgan son", truefalse: "To'g'ri/Noto'g'ri", comparison: "Taqqoslash", champion: "Chempion", balloon: "Sharlar o'yini" };
      return names[m] || m;
    }

    // ─── Game state ───
    let score = 0;
    let correct = 0;
    let wrong = 0;
    let currentQ = 0;
    let totalQ = mode === "time" ? 999 : mode === "champion" ? 15 : 10;
    let answered = false;
    let timerInterval = null;
    let timeLeft = 60;
    let currentDifficulty = difficulty;

    // ─── Init ───
    if (mode === "time") {
      document.getElementById("questionCounter").innerHTML = `<div class="text-xs text-gray-500">Vaqt</div><div class="text-lg font-extrabold text-gray-700" id="timerDisplay">60</div>`;
      document.getElementById("timerBarWrap").classList.remove("hidden");
      startTimer();
    }
    loadQuestion();

    // ─── Fetch question from API ───
    async function fetchQuestion() {
      const d = mode === "champion" ? Math.min(3, Math.ceil((currentQ + 1) / 5)) : currentDifficulty;
      const url = `/api/generate?grade=${grade}&topic=${topic}&difficulty=${d}`;
      const res = await fetch(url);
      return res.json();
    }

    // ─── Load & display question ───
    async function loadQuestion() {
      if (mode !== "time" && currentQ >= totalQ) {
        return showResult();
      }

      answered = false;
      currentQ++;
      if (mode !== "time") {
        document.getElementById("questionNum").textContent = `${currentQ}/${totalQ}`;
      }
      document.getElementById("feedback").classList.add("hidden");

      const q = await fetchQuestion();
      displayQuestion(q);
    }

    function displayQuestion(q) {
      const gameArea = document.getElementById("gameArea");
      gameArea.classList.remove("fade-in");
      void gameArea.offsetWidth;
      gameArea.classList.add("fade-in");

      let questionText = q.question;
      let options = q.options;

      // Mode-specific transformations
      if (mode === "truefalse") {
        // Show a statement that may be true or false
        const isCorrect = Math.random() > 0.4;
        let shownAnswer;
        if (isCorrect) {
          shownAnswer = q.answer;
        } else {
          // Pick a wrong answer from options
          const wrongs = options.filter((o) => o !== q.answer);
          shownAnswer = wrongs[Math.floor(Math.random() * wrongs.length)] || q.answer + 1;
        }
        questionText = q.question.replace("?", String(shownAnswer));
        options = ["To'g'ri", "Noto'g'ri"];
        q._tfCorrect = isCorrect ? "To'g'ri" : "Noto'g'ri";
      }

      if (mode === "missing") {
        // Replace the answer in the question text with ___
        const ansStr = String(q.answer);
        if (questionText.includes("= ?")) {
          questionText = questionText.replace("= ?", "= ___");
        } else {
          questionText = questionText.replace("?", "___");
        }
      }

      if (mode === "comparison") {
        // Force comparison-style display
        if (q.type !== "comparison") {
          // Convert MCQ to comparison-like
          options = q.options;
        } else {
          options = q.options;
        }
      }

      document.getElementById("questionText").textContent = questionText;

      const grid = document.getElementById("optionsGrid");
      grid.innerHTML = "";

      // Adjust grid for true/false (2 cols) or comparison (3 cols)
      if (mode === "truefalse") {
        grid.className = "grid grid-cols-2 gap-3 sm:gap-4 mb-6";
      } else if (options.length === 3) {
        grid.className = "grid grid-cols-3 gap-3 sm:gap-4 mb-6";
      } else {
        grid.className = "grid grid-cols-2 gap-3 sm:gap-4 mb-6";
      }

      options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.className = "opt-btn bg-white border-2 border-gray-200 rounded-xl py-4 px-6 text-lg sm:text-xl font-bold text-gray-800 hover:border-indigo-400 hover:bg-indigo-50";
        btn.textContent = String(opt);
        btn.addEventListener("click", () => handleAnswer(btn, opt, q));
        grid.appendChild(btn);
      });
    }

    function handleAnswer(btn, selected, q) {
      if (answered) return;
      answered = true;

      let correctAnswer;
      if (mode === "truefalse") {
        correctAnswer = q._tfCorrect;
      } else {
        correctAnswer = q.answer;
      }

      const isCorrect = String(selected) === String(correctAnswer);
      const allBtns = document.querySelectorAll(".opt-btn");

      if (isCorrect) {
        btn.classList.add("opt-correct");
        score += 10;
        correct++;
        showFeedback("To'g'ri! +10 ball", "text-emerald-600");
      } else {
        btn.classList.add("opt-wrong");
        wrong++;
        // Highlight correct answer
        allBtns.forEach((b) => {
          if (b.textContent === String(correctAnswer)) {
            b.classList.add("opt-correct");
          }
        });
        showFeedback(`Noto'g'ri. Javob: ${correctAnswer}`, "text-rose-600");
      }

      allBtns.forEach((b) => (b.disabled = true));
      document.getElementById("scoreDisplay").textContent = score;

      // Next question after delay
      setTimeout(() => {
        if (mode === "time" && timeLeft <= 0) {
          showResult();
        } else {
          loadQuestion();
        }
      }, 1000);
    }

    function showFeedback(text, cls) {
      const fb = document.getElementById("feedback");
      const ft = document.getElementById("feedbackText");
      ft.textContent = text;
      ft.className = `text-lg font-bold ${cls}`;
      fb.classList.remove("hidden");
    }

    // ─── Timer (time challenge mode) ───
    function startTimer() {
      timerInterval = setInterval(() => {
        timeLeft--;
        const display = document.getElementById("timerDisplay");
        if (display) display.textContent = timeLeft;
        document.getElementById("timerBar").style.width = `${(timeLeft / 60) * 100}%`;

        if (timeLeft <= 10) {
          document.getElementById("timerBar").className = "timer-bar h-full bg-rose-500 rounded-r-full";
        }

        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          if (!answered) {
            showResult();
          }
        }
      }, 1000);
    }

    // ─── Result screen ───
    async function showResult() {
      if (timerInterval) clearInterval(timerInterval);

      document.getElementById("gameArea").classList.add("hidden");
      document.getElementById("resultArea").classList.remove("hidden");

      const total = correct + wrong;
      const pct = total > 0 ? Math.round((correct / total) * 100) : 0;

      // Calculate rewards
      const qInfo = getCurrentQuarterInfo();
      const rewards = calculateRewards(correct, qInfo.isVacation);

      document.getElementById("finalScore").textContent = rewards.score;
      document.getElementById("correctCount").textContent = correct;
      document.getElementById("wrongCount").textContent = wrong;

      // Emoji & title based on performance
      let emoji, title, sub;
      if (pct >= 90) {
        emoji = "\uD83C\uDFC6"; title = "Ajoyib!"; sub = "Siz haqiqiy chempionsiz!";
      } else if (pct >= 70) {
        emoji = "\uD83C\uDF1F"; title = "Yaxshi!"; sub = "Juda yaxshi natija!";
      } else if (pct >= 50) {
        emoji = "\uD83D\uDCAA"; title = "Yomon emas!"; sub = "Mashq qiling, yaxshilanasiz!";
      } else {
        emoji = "\uD83D\uDCDA"; title = "Mashq kerak!"; sub = "Ko'proq mashq qiling!";
      }

      document.getElementById("resultEmoji").textContent = emoji;
      document.getElementById("resultTitle").textContent = title;

      // Show reward info
      let rewardText = sub;
      if (qInfo.isVacation) {
        rewardText += ` | \u{1FA99} +${rewards.goldCoins} oltin tanga`;
      } else {
        rewardText += ` | \uD83D\uDC8E +${rewards.diamonds} olmos`;
      }
      document.getElementById("resultSub").textContent = rewardText;

      // Animate progress bar
      setTimeout(() => {
        document.getElementById("resultBar").style.width = `${pct}%`;
      }, 300);

      // Save to Supabase
      if (_profile && !_saved && total > 0) {
        _saved = true;
        try {
          await saveGameSession({
            userId: _profile.id,
            grade: parseInt(grade),
            topicId: topic,
            topicName: topicName,
            mode: mode,
            difficulty: difficulty,
            problemsSolved: total,
            correctCount: correct,
            wrongCount: wrong,
            score: rewards.score,
            diamonds: rewards.diamonds,
            goldCoins: rewards.goldCoins,
            isVacation: qInfo.isVacation,
            quarter: qInfo.quarter,
            academicYear: qInfo.academicYear
          });
        } catch (e) {
          console.error('Natija saqlanmadi:', e);
        }
      }
    }

    function restartGame() {
      score = 0;
      correct = 0;
      wrong = 0;
      currentQ = 0;
      answered = false;
      _saved = false;
      timeLeft = 60;
      currentDifficulty = difficulty;

      document.getElementById("scoreDisplay").textContent = "0";
      document.getElementById("resultArea").classList.add("hidden");
      document.getElementById("gameArea").classList.remove("hidden");

      if (mode === "time") {
        document.getElementById("timerBar").style.width = "100%";
        document.getElementById("timerBar").className = "timer-bar h-full bg-indigo-500 rounded-r-full";
        startTimer();
      }

      loadQuestion();
    }
  </script>

</body>
</html>
