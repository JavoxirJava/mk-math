<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sharlar o'yini — UzMath Mini</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ─── Sky background ─── */
    #skyBg {
      position: fixed; inset: 0; z-index: 0;
      background: linear-gradient(180deg, #a8d8ff 0%, #d0eaff 40%, #e8f4e6 75%, #c5e8b0 100%);
    }
    /* animated clouds */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      filter: blur(1px);
    }
    .cloud::before, .cloud::after {
      content: ''; position: absolute; background: white; border-radius: 50%;
    }

    /* ─── Balloon arena ─── */
    #arena {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1;
      pointer-events: none;
    }

    /* ─── Balloon ─── */
    .balloon-wrap {
      position: absolute;
      bottom: -160px;
      pointer-events: auto;
      cursor: pointer;
      z-index: 5;
      transition: filter 0.1s;
    }
    .balloon-wrap:hover {
      filter: brightness(1.12);
    }
    .balloon-wrap.floating {
      animation: floatUp var(--duration) linear forwards;
    }
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      10%  { opacity: 1; }
      85%  { opacity: 1; }
      100% { transform: translateY(calc(-100vh - 250px)) rotate(var(--sway)); opacity: 0; }
    }

    .balloon {
      width: 90px; height: 110px;
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      box-shadow: inset -10px -8px 20px rgba(0,0,0,0.1), inset 8px 8px 20px rgba(255,255,255,0.35);
    }
    .balloon::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%; transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 10px solid var(--knot-color);
    }
    .balloon-string {
      position: absolute;
      bottom: -55px; left: 50%;
      width: 2px; height: 48px;
      background: rgba(0,0,0,0.2);
      transform: translateX(-50%);
      border-radius: 1px;
    }
    .balloon-label {
      font-size: 22px;
      font-weight: 800;
      color: white;
      text-shadow: 0 2px 4px rgba(0,0,0,0.25);
      z-index: 1;
      line-height: 1;
    }

    /* Pop animation */
    .balloon-wrap.popping .balloon {
      animation: popBalloon 0.35s ease-out forwards;
    }
    .balloon-wrap.popping .balloon-string { display: none; }
    @keyframes popBalloon {
      0%   { transform: scale(1); opacity: 1; }
      30%  { transform: scale(1.35); opacity: 0.8; }
      100% { transform: scale(0); opacity: 0; }
    }

    /* Shake animation */
    .balloon-wrap.shaking .balloon {
      animation: shakeBalloon 0.5s ease-in-out;
    }
    @keyframes shakeBalloon {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-12px) rotate(-6deg); }
      30% { transform: translateX(10px) rotate(5deg); }
      45% { transform: translateX(-8px) rotate(-4deg); }
      60% { transform: translateX(6px) rotate(3deg); }
      75% { transform: translateX(-3px) rotate(-1deg); }
    }

    /* Pop particles */
    .pop-particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      z-index: 10;
      animation: particleBurst 0.5s ease-out forwards;
    }
    @keyframes particleBurst {
      0%   { transform: translate(0,0) scale(1); opacity: 1; }
      100% { transform: translate(var(--px), var(--py)) scale(0); opacity: 0; }
    }

    /* ─── Confetti ─── */
    .confetti-piece {
      position: fixed; top: -20px;
      width: 10px; height: 16px;
      z-index: 100;
      pointer-events: none;
      animation: confettiFall var(--fall-dur) linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform: translateY(0) rotateZ(0deg) rotateX(0deg); opacity: 1; }
      100% { transform: translateY(110vh) rotateZ(var(--rz)) rotateX(var(--rx)); opacity: 0; }
    }

    /* ─── Streak banner ─── */
    .streak-banner {
      animation: streakPop 0.6s ease-out;
    }
    @keyframes streakPop {
      0%   { transform: scale(0.3) translateY(20px); opacity: 0; }
      50%  { transform: scale(1.15) translateY(-5px); opacity: 1; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ─── Score float ─── */
    .score-float {
      position: fixed;
      pointer-events: none;
      z-index: 50;
      animation: scoreFloatUp 0.8s ease-out forwards;
    }
    @keyframes scoreFloatUp {
      0%   { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-60px) scale(1.3); opacity: 0; }
    }

    /* ─── HUD ─── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    }
  </style>
</head>
<body class="h-screen">

  <!-- Sky background -->
  <div id="skyBg"></div>

  <!-- Balloon arena -->
  <div id="arena"></div>

  <!-- HUD -->
  <div id="hud">
    <div class="bg-white/85 backdrop-blur-sm shadow-md">
      <div class="max-w-4xl mx-auto px-4 py-2.5 flex items-center justify-between">
        <!-- Left: back + info -->
        <div class="flex items-center gap-3">
          <a href="index.html" class="w-9 h-9 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold text-sm hover:bg-indigo-700">M</a>
          <div>
            <h1 class="text-sm font-bold text-gray-800" id="headerTitle">Sharlar o'yini</h1>
            <p class="text-xs text-gray-400" id="headerSub"></p>
          </div>
        </div>
        <!-- Right: score + questions + streak -->
        <div class="flex items-center gap-5">
          <div id="streakWrap" class="hidden">
            <div class="flex items-center gap-1 bg-amber-100 rounded-full px-3 py-1">
              <span class="text-base">&#128293;</span>
              <span id="streakNum" class="text-sm font-extrabold text-amber-700">0</span>
            </div>
          </div>
          <div class="text-right">
            <div class="text-[10px] text-gray-400 uppercase tracking-wider">Ball</div>
            <div class="text-xl font-extrabold text-indigo-600" id="scoreDisplay">0</div>
          </div>
          <div class="text-right">
            <div class="text-[10px] text-gray-400 uppercase tracking-wider">Savol</div>
            <div class="text-xl font-extrabold text-gray-700" id="questionNum">1/10</div>
          </div>
        </div>
      </div>
      <!-- Timer bar -->
      <div id="timerBarWrap" class="h-1.5 bg-gray-200">
        <div id="timerBar" class="h-full bg-indigo-500 rounded-r-full transition-all duration-500" style="width:100%"></div>
      </div>
    </div>

    <!-- Question banner -->
    <div class="flex justify-center mt-4 px-4">
      <div id="questionBanner" class="bg-white/90 backdrop-blur rounded-2xl shadow-lg px-8 py-5 max-w-lg w-full text-center">
        <p id="questionText" class="text-2xl sm:text-3xl font-extrabold text-gray-800"></p>
      </div>
    </div>
  </div>

  <!-- Result overlay -->
  <div id="resultOverlay" class="hidden fixed inset-0 z-[200] bg-black/40 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-2xl p-8 sm:p-12 max-w-md w-full text-center">
      <div id="resultEmoji" class="text-6xl mb-3"></div>
      <h2 id="resultTitle" class="text-3xl font-extrabold text-gray-800 mb-1"></h2>
      <p id="resultSub" class="text-gray-500 mb-6"></p>
      <div class="flex items-center justify-center gap-6 mb-6">
        <div>
          <div class="text-4xl font-extrabold text-indigo-600" id="finalScore">0</div>
          <div class="text-xs text-gray-400">Ball</div>
        </div>
        <div class="w-px h-10 bg-gray-200"></div>
        <div>
          <div class="text-4xl font-extrabold text-emerald-600" id="correctCount">0</div>
          <div class="text-xs text-gray-400">To'g'ri</div>
        </div>
        <div class="w-px h-10 bg-gray-200"></div>
        <div>
          <div class="text-4xl font-extrabold text-rose-500" id="wrongCount">0</div>
          <div class="text-xs text-gray-400">Noto'g'ri</div>
        </div>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-2.5 mb-6">
        <div id="resultBar" class="h-2.5 rounded-full bg-gradient-to-r from-emerald-400 to-emerald-600" style="width:0%;transition:width 0.8s"></div>
      </div>
      <div class="flex flex-col sm:flex-row gap-3 justify-center">
        <button onclick="restartGame()" class="px-6 py-3 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition">Qayta o'ynash</button>
        <a id="backToTopics" href="#" class="px-6 py-3 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition text-center">Mavzularga</a>
      </div>
    </div>
  </div>

  <script src="js/balloonGame.js"></script>
</body>
</html>
